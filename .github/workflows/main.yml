name: .NET Core Test and Publish

on:
  push:
    branches: [master]
  pull_request:

env:
  DOTNET_VERSION: 10.0.x

jobs:

  Check-Vulnerable:
    name: Scan for Vulnerable Dependencies
    timeout-minutes: 15
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore
      run: dotnet restore
    - name: Scan for Vulnerable Dependencies
      run: dotnet list package --vulnerable --include-transitive

  Test:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key         : ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: ${{ runner.os }}-nuget-
    - name: Check Format (*.cs)
      if: matrix.os == 'ubuntu-latest'
      run: dotnet format --verify-no-changes --verbosity diagnostic
    - name: Generate crypto cross-platform report
      run: |
        dotnet test tests/Neo.UnitTests/Neo.UnitTests.csproj --filter "FullyQualifiedName~CrossPlatform_Report_Pr4506CryptoBehavior" -p:GITHUB_ACTIONS=true
    - name: Test (ALL OS)
      if: matrix.os != 'ubuntu-latest'
      run: |
        dotnet test -p:GITHUB_ACTIONS=true
    - name: Test (ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        find tests -name *.csproj | xargs -I % dotnet add % package coverlet.msbuild
        dotnet test /p:GITHUB_ACTIONS=true /p:CollectCoverage=true /p:CoverletOutput='${{ github.workspace }}/TestResults/coverage/' /p:MergeWith='${{ github.workspace }}/TestResults/coverage/coverage.json' /p:CoverletOutputFormat=\"lcov,json\" -m:1
    - name: Upload crypto cross-platform report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: crypto-sign-verify-report-${{ matrix.os }}
        path: ${{ github.workspace }}/TestResults/cross-platform/UT_CryptoSignVerify.*.json
        if-no-files-found: warn
    - name: Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ${{ github.workspace }}/TestResults/coverage/coverage.info
        fail_ci_if_error: false

  Compare-CryptoSignVerify:
    needs: [Test]
    runs-on: ubuntu-latest
    steps:
    - name: Download crypto reports
      uses: actions/download-artifact@v4
      with:
        pattern: crypto-sign-verify-report-*
        path: ${{ github.workspace }}/cross-platform-reports
        merge-multiple: true
    - name: Compare crypto reports
      shell: python
      run: |
        import json
        import os
        import sys
        from pathlib import Path

        report_dir = Path(os.environ["GITHUB_WORKSPACE"]) / "cross-platform-reports"
        report_files = sorted(report_dir.glob("UT_CryptoSignVerify.*.json"))
        if len(report_files) < 3:
            print(f"Expected 3 reports, found {len(report_files)}: {[str(p) for p in report_files]}")
            sys.exit(1)

        reports = {}
        for path in report_files:
            data = json.loads(path.read_text())
            reports[data["Platform"]] = data

        required = ["windows", "linux", "macos"]
        missing = [platform for platform in required if platform not in reports]
        if missing:
            print(f"Missing platform reports: {missing}")
            sys.exit(1)

        invariant_fields = [
            "Sha256Hex",
            "Sha512Hex",
            "Keccak256Hex",
            "VerifySecp256r1Sha256RoundTrip",
            "VerifySecp256r1KeccakRoundTrip",
            "VerifySecp256k1Sha256RoundTrip",
            "VerifySecp256k1KeccakRoundTrip",
            "VerifySecp256k1Sha256FixedCompressed",
            "VerifySecp256k1Sha256FixedUncompressed",
            "VerifySecp256k1KeccakFixed",
            "CreateEcdsaSecp256r1",
            "CreateEcdsaSecp256k1",
        ]

        summary_lines = ["## Crypto Cross-Platform Report", "", "| Field | windows | linux | macos |", "| --- | --- | --- | --- |"]
        failures = []

        for field in invariant_fields:
            values = [reports[platform][field] for platform in required]
            summary_lines.append(f"| {field} | {values[0]} | {values[1]} | {values[2]} |")
            if len({json.dumps(value, sort_keys=True) for value in values}) != 1:
                failures.append(f"Invariant field differs across platforms: {field} -> {values}")

        summary_lines.extend([
            "",
            "### Raw platform result objects",
            "",
            "| Field | windows | linux | macos |",
            "| --- | --- | --- | --- |",
        ])

        raw_result_fields = [
            "CreateEcdsaSecp256r1",
            "CreateEcdsaSecp256k1",
        ]

        for field in raw_result_fields:
            values = [reports[platform][field] for platform in required]
            summary_lines.append(
                f"| {field} | `{json.dumps(values[0], sort_keys=True)}` | `{json.dumps(values[1], sort_keys=True)}` | `{json.dumps(values[2], sort_keys=True)}` |"
            )

        summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
        summary_path.write_text("\n".join(summary_lines))

        if failures:
            print("\n".join(failures))
            sys.exit(1)

  PublishMyGet:
    if: github.ref == 'refs/heads/master' && startsWith(github.repository, 'neo-project/')
    needs: [Test]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Set Version
      run: git rev-list --count HEAD | xargs printf 'CI%05d' | xargs -I{} echo 'VERSION_SUFFIX={}' >> $GITHUB_ENV
    - name : Pack (Everything)
      run: dotnet pack -c Debug -o out --include-source --version-suffix ${{ env.VERSION_SUFFIX }}
    - name: Publish to myGet
      run: dotnet nuget push out/*.nupkg -s https://www.myget.org/F/neo/api/v2/package -k ${MYGET_TOKEN} -ss https://www.myget.org/F/neo/symbols/api/v2/package -sk ${MYGET_TOKEN}
      env:
        MYGET_TOKEN: ${{ secrets.MYGET_TOKEN }}
        
  Release:
    if: github.ref == 'refs/heads/master' && startsWith(github.repository, 'neo-project/')
    needs: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Get version
      id: get_version
      run: |
        sudo apt install xmlstarlet
        find src -name Directory.Build.props | xargs xmlstarlet sel -N i=http://schemas.microsoft.com/developer/msbuild/2003 -t -v "concat('version=v',//i:Version/text())" | xargs echo >> $GITHUB_OUTPUT
    - name: Check tag
      if: steps.get_version.outputs.version != 'v' && startsWith(steps.get_version.outputs.version, 'v')
      id: check_tag
      run: curl -s -I ${{ format('https://github.com/{0}/releases/tag/{1}', github.repository, steps.get_version.outputs.version) }} | head -n 1 | cut -d$' ' -f2 | xargs printf "statusCode=%s" | xargs echo >> $GITHUB_OUTPUT
    - name: Create release
      if: steps.check_tag.outputs.statusCode == '404'
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        release_name: ${{ steps.get_version.outputs.version }}
        prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
    - name: Setup .NET Core
      if: steps.check_tag.outputs.statusCode == '404'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Publish to NuGet
      if: steps.check_tag.outputs.statusCode == '404'
      run: |
        dotnet pack -o out -c Release
        dotnet nuget push out/*.nupkg -s https://api.nuget.org/v3/index.json -k ${NUGET_TOKEN}
      env:
        NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
